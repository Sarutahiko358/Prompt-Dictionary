<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI コーディング プロンプト用語辞典 v2.0</title>
    <style>
        :root {
            --bg: #0a0c14;
            --bg2: #0f1219;
            --card: #151926;
            --card-hover: #1c2237;
            --accent: #6c63ff;
            --accent2: #00d4aa;
            --accent3: #ff6b9d;
            --text: #e8e8f0;
            --text-dim: #8888aa;
            --text-xdim: #555577;
            --border: #232840;
            --border-light: #2e3352;
            --cat1: #6c63ff;
            --cat2: #00d4aa;
            --cat3: #ff6b9d;
            --cat4: #ffa726;
            --cat5: #42a5f5;
            --cat6: #ab47bc;
            --cat7: #66bb6a;
            --cat8: #ef5350;
            --cat9: #26c6da;
            --cat10: #d4e157;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', 'Meiryo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ===== Header ===== */
        header {
            background: linear-gradient(160deg, #12082a 0%, #0a0c14 50%, #071018 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 20px 16px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 4px;
        }

        header h1 {
            font-size: 1.5em;
            background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            background-size: 200% 200%;
            animation: gradShift 4s ease infinite;
        }

        @keyframes gradShift {

            0%,
            100% {
                background-position: 0% 50%
            }

            50% {
                background-position: 100% 50%
            }
        }

        .version-badge {
            font-size: .65em;
            padding: 2px 8px;
            border-radius: 8px;
            background: rgba(108, 99, 255, .2);
            color: var(--accent);
            border: 1px solid rgba(108, 99, 255, .3);
        }

        header .subtitle {
            color: var(--text-dim);
            font-size: 0.82em;
            margin-bottom: 14px;
        }

        /* Stats Cards */
        .stats-cards {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            max-width: 700px;
            margin: 0 auto 14px;
        }

        .stat-card {
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 8px 16px;
            text-align: center;
            min-width: 90px;
        }

        .stat-card .stat-num {
            font-size: 1.4em;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stat-card .stat-label {
            font-size: .65em;
            color: var(--text-dim);
            margin-top: 2px;
        }

        /* Search */
        .search-area {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }

        #searchInput {
            width: 100%;
            padding: 12px 44px 12px 44px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card);
            color: var(--text);
            font-size: .95em;
            outline: none;
            transition: all .3s;
        }

        #searchInput:focus {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(108, 99, 255, .15);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1.1em;
            pointer-events: none;
        }

        .search-clear {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.2em;
            cursor: pointer;
            display: none;
            line-height: 1;
        }

        .search-clear.show {
            display: block;
        }

        .search-clear:hover {
            color: #fff;
        }

        .search-meta {
            max-width: 600px;
            margin: 8px auto 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75em;
            color: var(--text-dim);
        }

        .view-toggles {
            display: flex;
            gap: 4px;
        }

        .view-btn {
            padding: 4px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            font-size: .85em;
            transition: all .2s;
        }

        .view-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* Filters */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            padding: 12px 20px 0;
            max-width: 960px;
            margin: 0 auto;
        }

        .filter-btn {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            font-size: 0.75em;
            cursor: pointer;
            transition: all .3s;
            white-space: nowrap;
        }

        .filter-btn:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            font-weight: 600;
        }

        .eff-filter {
            display: flex;
            gap: 4px;
            justify-content: center;
            padding: 8px 20px 0;
            max-width: 600px;
            margin: 0 auto;
        }

        .eff-btn {
            padding: 4px 10px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-xdim);
            font-size: .7em;
            cursor: pointer;
            transition: all .3s;
        }

        .eff-btn:hover {
            border-color: var(--accent2);
            color: var(--text-dim);
        }

        .eff-btn.active {
            background: rgba(0, 212, 170, .15);
            border-color: var(--accent2);
            color: var(--accent2);
        }

        /* ===== Main ===== */
        .container {
            max-width: 1060px;
            margin: 0 auto;
            padding: 20px 16px 80px;
        }

        .category-section {
            margin-bottom: 28px;
        }

        .category-title {
            font-size: 1.05em;
            font-weight: 700;
            margin-bottom: 10px;
            padding-left: 14px;
            border-left: 4px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .category-badge {
            font-size: 0.62em;
            padding: 2px 8px;
            border-radius: 10px;
            color: #fff;
            font-weight: 600;
        }

        /* Grid View */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 10px;
        }

        /* List View */
        .cards-grid.list-view {
            grid-template-columns: 1fr;
        }

        .cards-grid.list-view .card {
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            padding: 12px 18px;
        }

        .cards-grid.list-view .card-summary,
        .cards-grid.list-view .card-tags,
        .cards-grid.list-view .expand-icon {
            display: none;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all .3s;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            background: var(--card-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 99, 255, 0.12);
            border-color: var(--border-light);
        }

        .card-cat-line {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 6px;
            gap: 8px;
        }

        .card-word {
            font-size: .95em;
            font-weight: 700;
            color: #fff;
            word-break: break-all;
            line-height: 1.3;
        }

        .card-en {
            font-size: .72em;
            color: var(--text-dim);
            margin-bottom: 6px;
        }

        .card-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .card-effectiveness {
            font-size: 0.65em;
            padding: 2px 7px;
            border-radius: 8px;
            background: rgba(0, 212, 170, 0.12);
            color: var(--accent2);
            white-space: nowrap;
        }

        .card-fav {
            background: none;
            border: none;
            color: var(--text-xdim);
            cursor: pointer;
            font-size: 1em;
            transition: all .2s;
            padding: 0;
        }

        .card-fav:hover,
        .card-fav.active {
            color: #ff6b9d;
        }

        .card-summary {
            font-size: 0.78em;
            color: var(--text-dim);
            line-height: 1.55;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 8px;
        }

        .card-tag {
            font-size: .64em;
            padding: 2px 6px;
            border-radius: 5px;
            background: rgba(255, 255, 255, .04);
            color: var(--text-xdim);
        }

        .expand-icon {
            position: absolute;
            bottom: 6px;
            right: 10px;
            color: var(--text-xdim);
            font-size: .68em;
        }

        /* ===== Modal ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .75);
            z-index: 200;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px;
            overflow-y: auto;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 18px;
            max-width: 700px;
            width: 100%;
            padding: 30px;
            position: relative;
            animation: modalIn .3s ease;
            margin: auto;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(.96) translateY(12px)
            }

            to {
                opacity: 1;
                transform: scale(1) translateY(0)
            }
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 16px;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 1.5em;
            cursor: pointer;
            line-height: 1;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all .2s;
        }

        .modal-close:hover {
            color: #fff;
            background: rgba(255, 255, 255, .08);
        }

        .modal-nav {
            display: flex;
            gap: 8px;
            position: absolute;
            top: 14px;
            right: 56px;
        }

        .modal-nav button {
            background: rgba(255, 255, 255, .06);
            border: 1px solid var(--border);
            color: var(--text-dim);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            font-size: .8em;
            transition: all .2s;
        }

        .modal-nav button:hover {
            background: rgba(255, 255, 255, .12);
            color: #fff;
        }

        .modal-cat-badge {
            display: inline-block;
            font-size: .72em;
            padding: 3px 12px;
            border-radius: 10px;
            color: #fff;
            margin-bottom: 8px;
        }

        .modal h2 {
            font-size: 1.4em;
            margin-bottom: 4px;
            line-height: 1.3;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .modal-en {
            color: var(--text-dim);
            font-size: .85em;
            margin-bottom: 4px;
        }

        .modal-eff {
            color: var(--accent2);
            font-size: .82em;
            margin-bottom: 16px;
        }

        .modal-section {
            margin-bottom: 18px;
        }

        .modal-section h3 {
            font-size: .82em;
            color: var(--accent);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: .5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-section p {
            font-size: .85em;
            color: var(--text-dim);
            line-height: 1.75;
        }

        .modal-section pre {
            background: rgba(0, 0, 0, .35);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            font-family: 'Consolas', 'Monaco', 'Fira Code', monospace;
            font-size: .8em;
            color: var(--accent2);
            line-height: 1.6;
            position: relative;
        }

        .copy-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding: 6px 14px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: .75em;
            cursor: pointer;
            transition: all .3s;
        }

        .copy-btn:hover {
            background: #5a52e0;
            transform: translateY(-1px);
        }

        .modal-section .tips-box {
            background: rgba(0, 212, 170, .06);
            border: 1px solid rgba(0, 212, 170, .15);
            border-radius: 10px;
            padding: 12px 16px;
            margin-top: 8px;
        }

        .tips-box h4 {
            font-size: .78em;
            color: var(--accent2);
            margin-bottom: 4px;
        }

        .tips-box p {
            font-size: .8em;
        }

        .modal-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-top: 14px;
        }

        .modal-tag {
            font-size: .72em;
            padding: 4px 10px;
            border-radius: 8px;
            background: rgba(108, 99, 255, .12);
            color: var(--accent);
            cursor: pointer;
            transition: all .2s;
        }

        .modal-tag:hover {
            background: rgba(108, 99, 255, .25);
        }

        .related-section {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .related-section h3 {
            font-size: .82em;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .related-cards {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .related-card {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: .78em;
            cursor: pointer;
            transition: all .2s;
            color: var(--text-dim);
        }

        .related-card:hover {
            background: rgba(108, 99, 255, .1);
            color: #fff;
            border-color: var(--accent);
        }

        /* ===== Footer ===== */
        .page-footer {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-xdim);
            font-size: .75em;
            border-top: 1px solid var(--border);
        }

        .no-results {
            text-align: center;
            color: var(--text-dim);
            padding: 60px 20px;
            font-size: .95em;
        }

        .no-results .emoji {
            font-size: 2.5em;
            margin-bottom: 12px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 5px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px
        }

        /* Back to top */
        .back-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 50;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.2em;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(108, 99, 255, .4);
            transition: all .3s;
        }

        .back-top.show {
            display: flex;
        }

        .back-top:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(108, 99, 255, .6);
        }

        @media(max-width:640px) {
            header h1 {
                font-size: 1.15em
            }

            .stats-cards {
                gap: 8px
            }

            .stat-card {
                min-width: 70px;
                padding: 6px 10px
            }

            .stat-card .stat-num {
                font-size: 1.1em
            }

            .cards-grid {
                grid-template-columns: 1fr
            }

            .modal {
                padding: 20px;
                margin: 20px 0;
            }

            .modal-nav {
                display: none
            }
        }
    </style>

<body>

    <header>
        <div class="header-top">
            <h1>AI Coding Prompt Dictionary</h1>
            <span class="version-badge">v2.0</span>
        </div>
        <p class="subtitle">AIにコードを書かせる時に使うと効果的なキーワード・フレーズ集 — 全<span id="totalCount">0</span>語収録</p>

        <div style="display:flex;gap:8px;justify-content:center;margin:8px 0;flex-wrap:wrap">
            <a href="index.html"
                style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,0.1);color:#fff;text-decoration:none;font-size:0.72em;font-weight:600;border:1px solid rgba(255,255,255,0.15);transition:all 0.2s">
                📚 Web UIコンポーネント辞典
            </a>
            <a href="design-dict.html"
                style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,0.1);color:#fff;text-decoration:none;font-size:0.72em;font-weight:600;border:1px solid rgba(255,255,255,0.15);transition:all 0.2s">
                🎨 AI Design Prompt辞典
            </a>
        </div>


        <div class="stats-cards">
            <div class="stat-card">
                <div class="stat-num" id="sTotal">0</div>
                <div class="stat-label">総用語数</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="sCat">0</div>
                <div class="stat-label">カテゴリ</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="s5star">0</div>
                <div class="stat-label">★5 最重要</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="sFav">0</div>
                <div class="stat-label">お気に入り</div>
            </div>
        </div>

        <div class="search-area">
            <span class="search-icon">&#128269;</span>
            <input type="text" id="searchInput" placeholder="キーワード検索（日本語 / English / タグ）...">
            <button class="search-clear" id="searchClear">&times;</button>
        </div>
        <div class="search-meta">
            <span id="resultCount">-</span>
            <div class="view-toggles">
                <button class="view-btn active" data-view="grid" title="グリッド表示">&#9638;</button>
                <button class="view-btn" data-view="list" title="リスト表示">&#9776;</button>
            </div>
        </div>
        <div class="filter-bar" id="filterBar"></div>
        <div class="eff-filter" id="effFilter"></div>
    </header>

    <div class="container" id="mainContent"></div>

    <button class="back-top" id="backTop" title="トップへ戻る">&#8593;</button>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal"></div>
    </div>

    <footer class="page-footer">
        AI Coding Prompt Dictionary v2.0 &mdash; プロンプトエンジニアリングでコーディング効率を最大化<br>
        最終更新: 2026年3月
    </footer>

    <script>
        // ==================== DATA ====================
        const CATEGORIES = [
            { id: "basic", name: "基本指示", color: "#6c63ff", icon: "📝" },
            { id: "quality", name: "品質・制約", color: "#00d4aa", icon: "✅" },
            { id: "structure", name: "構造・設計", color: "#ff6b9d", icon: "🏗️" },

                    btn.classList.add('active');
                    activeFilter = btn.dataset.cat;
                    render();
                });
            });

            // Effectiveness filter
            const effBar = document.getElementById('effFilter');
            const effs = ['all', '★★★★★', '★★★★☆', '★★★☆☆'];
            const effLabels = ['全て', '★5 最重要', '★4 重要', '★3 有効'];
            effBar.innerHTML = effs.map((e, i) =>
                `<button class="eff-btn ${e === 'all' ? 'active' : ''}" data-eff="${e}">${effLabels[i]}</button>`
            ).join('');
            effBar.querySelectorAll('.eff-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    effBar.querySelectorAll('.eff-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    effFilter = btn.dataset.eff;
                    render();
                });
            });
        }

        function getFilteredTerms() {
            let terms = TERMS;
            if (activeFilter === 'favorites') {
                terms = terms.filter(t => favorites.includes(t.word));
            } else if (activeFilter !== 'all') {
                terms = terms.filter(t => t.category === activeFilter);
            }
            if (effFilter !== 'all') {
                terms = terms.filter(t => t.effectiveness === effFilter);
            }
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                terms = terms.filter(t =>
                    t.word.toLowerCase().includes(q) ||
                    t.en.toLowerCase().includes(q) ||
                    t.summary.toLowerCase().includes(q) ||
                    t.detail.toLowerCase().includes(q) ||
                    (t.tips && t.tips.toLowerCase().includes(q)) ||
                    t.tags.some(tag => tag.toLowerCase().includes(q))
                );
            }
            return terms;
        }

        function render() {
            const container = document.getElementById('mainContent');
            const filtered = getFilteredTerms();
            document.getElementById('resultCount').textContent = `${filtered.length} / ${TERMS.length} 件表示中`;

            if (filtered.length === 0) {
                container.innerHTML = `<div class="no-results"><div class="emoji">🔍</div>該当する用語が見つかりません。<br>検索キーワードやフィルターを変更してみてください。</div>`;
                return;
            }

            const grouped = {};
            if (activeFilter === 'all' || activeFilter === 'favorites') {
                CATEGORIES.forEach(cat => {
                    const items = filtered.filter(t => t.category === cat.id);
                    if (items.length > 0) grouped[cat.id] = items;
                });
            } else {
                const items = filtered.filter(t => t.category === activeFilter);
                if (items.length > 0) grouped[activeFilter] = items;
            }

            let html = '';
            for (const [catId, items] of Object.entries(grouped)) {
                const cat = getCategoryInfo(catId);
                html += `<div class="category-section">`;
                html += `<div class="category-title" style="border-left-color:${cat.color}">
      ${cat.icon} ${cat.name}
      <span class="category-badge" style="background:${cat.color}">${items.length}</span>
    </div>`;
                html += `<div class="cards-grid ${viewMode === 'list' ? 'list-view' : ''}">`;
                items.forEach(term => {
                    const isFav = favorites.includes(term.word);
                    html += `
        <div class="card" data-index="${TERMS.indexOf(term)}">
          <div class="card-cat-line" style="background:linear-gradient(90deg,${cat.color},${cat.color}88)"></div>
          <div class="card-header">
            <div>
              <span class="card-word">${highlightSearch(term.word)}</span>
              <div class="card-en">${highlightSearch(term.en)}</div>
            </div>
            <div class="card-right">
              <span class="card-effectiveness">${term.effectiveness}</span>
              <button class="card-fav ${isFav ? 'active' : ''}" data-word="${term.word}" title="お気に入り">&#9733;</button>
            </div>
          </div>
          <div class="card-summary">${highlightSearch(term.summary)}</div>
          <div class="card-tags">
            ${term.tags.map(t => `<span class="card-tag">${t}</span>`).join('')}
          </div>
          <div class="expand-icon">&#9660; 詳細を見る</div>
        </div>`;
                });
                html += `</div></div>`;
            }
            container.innerHTML = html;

            container.querySelectorAll('.card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('card-fav')) return;
                    openModal(parseInt(card.dataset.index));
                });
            });
            container.querySelectorAll('.card-fav').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFav(btn.dataset.word);
                });
            });
        }

        function toggleFav(word) {
            if (favorites.includes(word)) {
                favorites = favorites.filter(f => f !== word);
            } else {
                favorites.push(word);
            }
            localStorage.setItem('promptdict_favs', JSON.stringify(favorites));
            updateStats();
            renderFilters();
            // Re-activate current filter
            document.querySelectorAll('.filter-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.cat === activeFilter);
            });
            render();
        }

        function highlightSearch(text) {
            if (!searchQuery) return text;
            const regex = new RegExp(`(${searchQuery.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<mark style="background:rgba(108,99,255,.35);color:#fff;border-radius:2px;padding:0 2px">$1</mark>');
        }

        function openModal(index) {
            const term = TERMS[index];
            const cat = getCategoryInfo(term.category);
            const isFav = favorites.includes(term.word);
            const modal = document.getElementById('modal');

            // Find related terms
            let relatedHtml = '';
            if (term.related && term.related.length > 0) {
                relatedHtml = `<div class="related-section"><h3>&#128279; 関連する用語</h3><div class="related-cards">`;
                term.related.forEach(rw => {
                    const ri = TERMS.findIndex(t => t.word === rw);
                    if (ri >= 0) {
                        relatedHtml += `<div class="related-card" data-ri="${ri}">${TERMS[ri].word}</div>`;
                    }
                });
                relatedHtml += `</div></div>`;
            }

            modal.innerHTML = `
    <div class="modal-nav">
      <button id="modalPrev" title="前へ">&#8592; 前</button>
      <button id="modalNext" title="次へ">次 &#8594;</button>
    </div>
    <button class="modal-close" id="modalClose">&times;</button>
    <span class="modal-cat-badge" style="background:${cat.color}">${cat.icon} ${cat.name}</span>
    <h2>${term.word}</h2>
    <div class="modal-en">${term.en}</div>
    <div class="modal-eff">効果度: ${term.effectiveness}
      <button class="card-fav ${isFav ? 'active' : ''}" style="margin-left:12px;font-size:1.2em" data-word="${term.word}" title="お気に入り">&#9733;</button>
    </div>

    <div class="modal-section">
      <h3>&#128214; 概要</h3>
      <p>${term.summary}</p>
    </div>

    <div class="modal-section">
      <h3>&#128161; 詳しい説明</h3>
      <p>${term.detail}</p>
    </div>

    <div class="modal-section">
      <h3>&#128187; 使用例（プロンプト例）</h3>
      <pre id="exampleCode">${term.example}</pre>
      <button class="copy-btn" id="copyBtn">&#128203; コピーする</button>
    </div>

    ${term.tips ? `
    <div class="modal-section">
      <div class="tips-box">
        <h4>&#128161; プロのTips</h4>
        <p>${term.tips}</p>
      </div>
    </div>` : ''}

    <div class="modal-tags">
      ${term.tags.map(t => `<span class="modal-tag">${t}</span>`).join('')}
    </div>

    ${relatedHtml}
  `;

            document.getElementById('modalOverlay').classList.add('show');
            document.body.style.overflow = 'hidden';

            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('copyBtn').addEventListener('click', () => {
                navigator.clipboard.writeText(term.example).then(() => {
                    const btn = document.getElementById('copyBtn');
                    btn.innerHTML = '&#10003; コピーしました!';
                    setTimeout(() => btn.innerHTML = '&#128203; コピーする', 1500);
                });
            });

            // Navigation
            const allFiltered = getFilteredTerms();
            const currentFilteredIndex = allFiltered.indexOf(term);
            document.getElementById('modalPrev').addEventListener('click', () => {
                const prevTerm = allFiltered[(currentFilteredIndex - 1 + allFiltered.length) % allFiltered.length];
                openModal(TERMS.indexOf(prevTerm));
            });
            document.getElementById('modalNext').addEventListener('click', () => {
                const nextTerm = allFiltered[(currentFilteredIndex + 1) % allFiltered.length];
                openModal(TERMS.indexOf(nextTerm));
            });

            // Related term clicks
            modal.querySelectorAll('.related-card').forEach(rc => {
                rc.addEventListener('click', () => openModal(parseInt(rc.dataset.ri)));
            });

            // Fav in modal
            modal.querySelectorAll('.card-fav').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleFav(btn.dataset.word);
                    btn.classList.toggle('active');
                });
            });

            // Tag click in modal
            modal.querySelectorAll('.modal-tag').forEach(tag => {
                tag.addEventListener('click', () => {
                    closeModal();
                    document.getElementById('searchInput').value = tag.textContent;
                    searchQuery = tag.textContent;
                    document.getElementById('searchClear').classList.add('show');
                    render();
                });
            });
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
            document.body.style.overflow = '';
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
            if (document.getElementById('modalOverlay').classList.contains('show')) {
                if (e.key === 'ArrowLeft') document.getElementById('modalPrev')?.click();
                if (e.key === 'ArrowRight') document.getElementById('modalNext')?.click();
            }
        });

        // Search
        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.trim();
            searchClear.classList.toggle('show', searchQuery.length > 0);
            render();
        });
        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchQuery = '';
            searchClear.classList.remove('show');
            searchInput.focus();
            render();
        });

        // View toggle
        document.querySelectorAll('.view-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                viewMode = btn.dataset.view;
                render();
            });
        });

        // Back to top
        const backTop = document.getElementById('backTop');
        window.addEventListener('scroll', () => {
            backTop.classList.toggle('show', window.scrollY > 400);
        });
        backTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Keyboard shortcut
        document.addEventListener('keydown', (e) => {
            if (e.key === '/' && !document.getElementById('modalOverlay').classList.contains('show')) {
                e.preventDefault();
                searchInput.focus();
            }
        });

        // Init
        updateStats();
        renderFilters();
        render();
    </script>
</body>

</html>
