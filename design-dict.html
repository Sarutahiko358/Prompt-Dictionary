<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Design Prompt Dictionary — AIにデザインを伝える言葉辞典 v2</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+JP:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&family=JetBrains+Mono:wght@400;500&display=swap');

    :root {
      --bg: #08090d;
      --surface: #11131a;
      --card: #161822;
      --card-hover: #1c1f2e;
      --border: #252838;
      --accent: #7c6aff;
      --accent2: #00e8b8;
      --accent3: #ff6ba6;
      --text: #e4e4f0;
      --text-dim: #7e80a0;
      --text-bright: #ffffff;
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box
    }

    body {
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .hero {
      background: linear-gradient(180deg, #12102a 0%, var(--bg) 100%);
      border-bottom: 1px solid var(--border);
      padding: 28px 20px 14px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(20px);
    }

    .hero-title {
      font-size: 1.6em;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent3), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-sub {
      color: var(--text-dim);
      font-size: 0.78em;
      margin: 4px 0 14px;
      font-weight: 400
    }

    .search-wrap {
      max-width: 640px;
      margin: 0 auto;
      position: relative
    }

    .search-wrap svg {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-dim)
    }

    #search {
      width: 100%;
      padding: 12px 18px 12px 48px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      color: var(--text);
      font-size: 0.92em;
      outline: none;
      transition: border .3s, box-shadow .3s;
      font-family: inherit;
    }

    #search:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124, 106, 255, .15)
    }

    #search::placeholder {
      color: var(--text-dim)
    }

    .meta-bar {
      max-width: 640px;
      margin: 8px auto 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.73em;
      color: var(--text-dim);
    }

    .action-btns {
      display: flex;
      gap: 6px
    }

    .action-btn {
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.92em;
      cursor: pointer;
      transition: all .25s;
      font-family: inherit;
    }

    .action-btn:hover {
      border-color: var(--accent);
      color: var(--text)
    }

    .action-btn.on {
      background: var(--accent3);
      border-color: var(--accent3);
      color: #fff
    }

    .tab-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 20px 2px;
      max-width: 1100px;
      margin: 0 auto;
      scrollbar-width: none;
    }

    .tab-scroll::-webkit-scrollbar {
      display: none
    }

    .tabs {
      display: flex;
      gap: 6px;
      width: max-content
    }

    .tab {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 0.74em;
      cursor: pointer;
      transition: all .25s;
      white-space: nowrap;
      font-family: inherit;
      font-weight: 500;
    }

    .tab:hover {
      border-color: var(--accent);
      color: var(--text)
    }

    .tab.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600
    }

    .view-bar {
      max-width: 1100px;
      margin: 10px auto 0;
      padding: 0 20px;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      align-items: center;
    }

    .view-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all .25s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .view-btn.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 14px 16px 80px
    }

    .section-title {
      font-size: 1.02em;
      font-weight: 700;
      margin-bottom: 10px;
      padding-left: 14px;
      border-left: 4px solid var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-badge {
      font-size: 0.62em;
      padding: 2px 9px;
      border-radius: 10px;
      color: #fff;
      font-weight: 600;
    }

    .section {
      margin-bottom: 30px
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
    }

    .list .card {
      display: flex;
      align-items: stretch;
      gap: 0
    }

    .list .card-body {
      flex: 1
    }

    .list .card-preview {
      width: 140px;
      min-height: 80px;
      flex-shrink: 0;
      border-radius: 10px;
      order: -1;
      margin: 12px 0 12px 12px;
      height: auto
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all .3s;
      position: relative;
    }

    .card:hover {
      background: var(--card-hover);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, .35);
    }

    .card-accent {
      height: 3px;
      width: 100%
    }

    .card-body {
      padding: 14px 16px 12px
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 3px
    }

    .card-word {
      font-size: 0.95em;
      font-weight: 700;
      color: var(--text-bright);
      line-height: 1.3
    }

    .card-en {
      font-size: 0.7em;
      color: var(--text-dim);
      margin-bottom: 5px;
      font-weight: 400
    }

    .card-eff {
      font-size: 0.62em;
      padding: 2px 7px;
      border-radius: 8px;
      background: rgba(0, 232, 184, .12);
      color: var(--accent2);
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 8px;
      font-weight: 600;
    }

    .card-sum {
      font-size: 0.78em;
      color: var(--text-dim);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 7px
    }

    .card-tag {
      font-size: 0.62em;
      padding: 2px 7px;
      border-radius: 6px;
      background: rgba(255, 255, 255, .05);
      color: var(--text-dim);
    }

    .card-fav {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 1em;
      z-index: 5;
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(255, 255, 255, .15);
      transition: all .25s;
      line-height: 1;
    }

    .card-fav:hover,
    .card-fav.on {
      color: var(--accent3)
    }

    .card-preview {
      height: 120px;
      margin: 0 12px 0;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7em;
      color: var(--text-dim);
      overflow: hidden;
      position: relative;
    }

    .card-preview-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      padding: 8px;
      overflow: hidden;
      position: relative;
    }

    /* Animated previews */
    .preview-shimmer {
      background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }

    @keyframes shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    .preview-pulse {
      animation: pulse 2s infinite ease-in-out
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .6
      }
    }

    .preview-float {
      animation: float 3s infinite ease-in-out
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0)
      }

      50% {
        transform: translateY(-6px)
      }
    }

    .preview-glow-anim {
      animation: glowPulse 2s infinite ease-in-out
    }

    @keyframes glowPulse {

      0%,
      100% {
        filter: drop-shadow(0 0 4px currentColor)
      }

      50% {
        filter: drop-shadow(0 0 16px currentColor)
      }
    }

    .preview-rotate {
      animation: slowRotate 8s infinite linear
    }

    @keyframes slowRotate {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    .preview-typing::after {
      content: '|';
      animation: blink 1s step-end infinite
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0
      }
    }

    .preview-gradient-move {
      background-size: 200% 200%;
      animation: gradMove 4s ease infinite
    }

    @keyframes gradMove {
      0% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }

      100% {
        background-position: 0% 50%
      }
    }

    .preview-bounce:hover .bounce-target {
      animation: bounce .5s
    }

    @keyframes bounce {

      0%,
      100% {
        transform: scale(1)
      }

      50% {
        transform: scale(1.3)
      }
    }

    .preview-ripple {
      position: relative;
      overflow: hidden
    }

    .ripple-ring {
      position: absolute;
      border: 2px solid rgba(124, 106, 255, .3);
      border-radius: 50%;
      width: 60px;
      height: 60px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: rippleOut 2s infinite ease-out;
    }

    .ripple-ring:nth-child(2) {
      animation-delay: .6s
    }

    .ripple-ring:nth-child(3) {
      animation-delay: 1.2s
    }

    @keyframes rippleOut {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1
      }

      100% {
        transform: translate(-50%, -50%) scale(1.5);
        opacity: 0
      }
    }

    .preview-scanline::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .15) 2px, rgba(0, 0, 0, .15) 4px);
      pointer-events: none;
    }

    .preview-grid-bg {
      background-image: linear-gradient(rgba(124, 106, 255, .1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124, 106, 255, .1) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .card-more {
      position: absolute;
      bottom: 6px;
      right: 12px;
      font-size: 0.68em;
      color: var(--text-dim);
    }

    /* Playground Overlay */
    .playground-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 500;
      background: var(--bg);
      animation: pgIn .4s ease;
    }

    .playground-overlay.show {
      display: block
    }

    @keyframes pgIn {
      from {
        opacity: 0
      }

      to {
        opacity: 1
      }
    }

    .pg-close {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 510;
      background: rgba(0, 0, 0, .6);
      border: 1px solid var(--border);
      color: #fff;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.3em;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      transition: all .3s;
    }

    .pg-close:hover {
      background: var(--accent);
      border-color: var(--accent)
    }

    .pg-info {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 510;
      background: rgba(0, 0, 0, .7);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 20px;
      border-radius: 12px;
      font-size: 0.8em;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      gap: 12px;
      max-width: 90%;
    }

    .pg-info-title {
      font-weight: 700;
      color: #fff
    }

    .pg-info-hint {
      color: var(--text-dim);
      font-size: .9em
    }

    .pg-content {
      width: 100%;
      height: 100%;
      overflow: auto
    }

    /* Interactive playground specific */
    .pg-interact-hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 510;
      background: rgba(124, 106, 255, .2);
      border: 1px solid rgba(124, 106, 255, .3);
      color: var(--accent);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.72em;
      font-weight: 500;
      animation: hintPulse 3s ease infinite;
    }

    @keyframes hintPulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: .6
      }
    }

    /* Prompt Builder */
    .builder-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 400;
      background: rgba(0, 0, 0, .75);
      backdrop-filter: blur(6px);
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .builder-overlay.show {
      display: flex
    }

    .builder {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      max-width: 800px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
      animation: mIn .3s ease;
    }

    .builder h2 {
      font-size: 1.2em;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 12px;
    }

    .builder-cat {
      margin-bottom: 16px
    }

    .builder-cat h3 {
      font-size: .78em;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: .5px
    }

    .builder-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 5px
    }

    .builder-chip {
      font-size: 0.72em;
      padding: 5px 12px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      transition: all .25s;
      user-select: none;
    }

    .builder-chip:hover {
      border-color: var(--accent);
      color: var(--text)
    }

    .builder-chip.on {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff
    }

    .builder-output {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .builder-output h3 {
      font-size: .78em;
      color: var(--accent2);
      font-weight: 700;
      margin-bottom: 8px
    }

    .builder-prompt {
      background: rgba(0, 0, 0, .35);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8em;
      color: var(--accent2);
      line-height: 1.7;
      min-height: 80px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .builder-actions {
      display: flex;
      gap: 8px;
      margin-top: 10px
    }

    .builder-btn {
      padding: 8px 18px;
      border-radius: 10px;
      border: none;
      font-size: 0.78em;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: all .3s;
    }

    .builder-btn-primary {
      background: var(--accent);
      color: #fff
    }

    .builder-btn-primary:hover {
      background: #6a58e8
    }

    .builder-btn-secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border)
    }

    .builder-btn-secondary:hover {
      border-color: var(--accent)
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .75);
      z-index: 300;
      justify-content: center;
      align-items: center;
      padding: 16px;
      backdrop-filter: blur(6px);
    }

    .overlay.show {
      display: flex
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      max-width: 740px;
      width: 100%;
      max-height: 88vh;
      overflow-y: auto;
      padding: 32px;
      position: relative;
      animation: mIn .3s ease;
    }

    @keyframes mIn {
      from {
        opacity: 0;
        transform: scale(.96) translateY(12px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 1.5em;
      cursor: pointer;
      line-height: 1;
    }

    .modal-close:hover {
      color: #fff
    }

    .modal-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text-dim);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1em;
      transition: all .25s;
    }

    .modal-nav:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent)
    }

    .modal-nav.prev {
      left: -50px
    }

    .modal-nav.next {
      right: -50px
    }

    @media(max-width:860px) {
      .modal-nav.prev {
        left: 12px;
        top: auto;
        bottom: 12px;
        transform: none
      }

      .modal-nav.next {
        right: 12px;
        top: auto;
        bottom: 12px;
        transform: none
      }
    }

    .modal-cat {
      display: inline-block;
      font-size: 0.7em;
      padding: 3px 11px;
      border-radius: 10px;
      color: #fff;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .modal h2 {
      font-size: 1.35em;
      font-weight: 800;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
    }

    .modal-en {
      color: var(--text-dim);
      font-size: 0.82em;
      margin-bottom: 3px
    }

    .modal-eff {
      color: var(--accent2);
      font-size: 0.82em;
      margin-bottom: 14px
    }

    .modal-sect {
      margin-bottom: 18px
    }

    .modal-sect h3 {
      font-size: 0.78em;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 5px;
      font-weight: 700;
    }

    .modal-sect p {
      font-size: 0.84em;
      color: var(--text-dim);
      line-height: 1.75
    }

    .modal-sect pre {
      background: rgba(0, 0, 0, .35);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      font-family: 'JetBrains Mono', 'Consolas', monospace;
      font-size: 0.8em;
      color: var(--accent2);
      line-height: 1.6;
    }

    .modal-preview {
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 14px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-preview-inner {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      border-radius: 14px;
      overflow: hidden;
      position: relative;
    }

    .modal-css {
      margin-top: 10px
    }

    .modal-css summary {
      font-size: 0.78em;
      color: var(--accent);
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .modal-css pre {
      font-size: 0.75em;
      padding: 10px
    }

    .copy-btn,

    function getItems() {

        const q = query.toLowerCase();
        items = items.filter(d =>
          d.word.toLowerCase().includes(q) || d.en.toLowerCase().includes(q) ||
          d.summary.toLowerCase().includes(q) || d.detail.toLowerCase().includes(q) ||
          d.tags.some(t => t.toLowerCase().includes(q)) ||
          (d.cssHint && d.cssHint.toLowerCase().includes(q))
        );
      }
      return items;

    function hl(text) {
      if (!query) return text;
      const r = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');

          <div class="pg-warm-tags">
            <span class="pg-warm-tag">焼きたて</span>
            <span class="pg-warm-tag">バター100%</span>
            <span class="pg-warm-tag">人気No.1</span>
          </div>
          <button class="pg-warm-btn">カートに追加 — ¥320</button>
        </div>
      </div>
    </div></div>`,

        darkneon: `<div class="pg-content"><div class="pg-darkneon-demo">
      <div class="pg-darkneon-dashboard">
        <div class="pg-darkneon-header">
          <h2>Dashboard</h2>
          <div class="live">LIVE</div>
        </div>
        <div class="pg-darkneon-stats">
          <div class="pg-darkneon-stat"><div class="val" id="neonVal1">0</div><div class="lbl">Active Users</div></div>
          <div class="pg-darkneon-stat"><div class="val" id="neonVal2">0</div><div class="lbl">Requests/sec</div></div>
          <div class="pg-darkneon-stat"><div class="val" id="neonVal3">0</div><div class="lbl">Uptime %</div></div>
        </div>
        <div class="pg-darkneon-chart" id="neonChart"></div>
      </div>
    </div></div>`,
      };

      html += playgrounds[type] || `<div class="pg-content" style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--text-dim)">Playground: ${type}</div>`;

      html += `<div class="pg-info"><span class="pg-info-title">${word}</span><span class="pg-info-hint">ESC で閉じる</span></div>`;

      pg.innerHTML = html;
      pg.classList.add('show');
      document.body.style.overflow = 'hidden';

      // Post-render animations
      if (type === 'cyberpunk') startCyberAnimation();
      if (type === 'darkneon') startNeonDashboard();
    }

    function closePlayground() {
      const pg = document.getElementById('playground');
      pg.classList.remove('show');
      pg.innerHTML = '';
      document.body.style.overflow = '';
      if (window._pgAnimId) cancelAnimationFrame(window._pgAnimId);
      if (window._pgInterval) clearInterval(window._pgInterval);
    }

    // Neumorphism calculator
    let neuVal = '0', neuOp = '', neuPrev = 0, neuFresh = true;
    function neuCalc(v) {
      const d = document.getElementById('neuDisplay');
      if (!d) return;
      if (v === 'C') { neuVal = '0'; neuOp = ''; neuPrev = 0; neuFresh = true; }
      else if (v === '±') { neuVal = String(-parseFloat(neuVal)); }
      else if (v === '%') { neuVal = String(parseFloat(neuVal) / 100); }
      else if (['+', '-', '×', '÷'].includes(v)) { neuPrev = parseFloat(neuVal); neuOp = v; neuFresh = true; }
      else if (v === '=') {
        const cur = parseFloat(neuVal);
        if (neuOp === '+') neuVal = String(neuPrev + cur);
        else if (neuOp === '-') neuVal = String(neuPrev - cur);
        else if (neuOp === '×') neuVal = String(neuPrev * cur);
        else if (neuOp === '÷') neuVal = cur !== 0 ? String(neuPrev / cur) : 'Error';
        neuOp = ''; neuFresh = true;
      } else {
        if (neuFresh) { neuVal = v; neuFresh = false; }
        else neuVal += v;
      }
      d.textContent = neuVal.length > 12 ? parseFloat(neuVal).toExponential(4) : neuVal;
    }

    // Cyberpunk counter animation
    function startCyberAnimation() {
      const targets = [
        { el: 'cyberNum1', target: 8472, prefix: '' },
        { el: 'cyberNum2', target: 2341, prefix: '' },
        { el: 'cyberNum3', target: 947, prefix: '' }
      ];
      let frame = 0;
      function tick() {
        frame++;
        targets.forEach(t => {
          const el = document.getElementById(t.el);
          if (!el) return;
          const progress = Math.min(frame / 60, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          el.textContent = t.prefix + Math.floor(t.target * eased).toLocaleString();
        });
        if (frame < 60) window._pgAnimId = requestAnimationFrame(tick);
      }
      tick();
    }

    // Dark Neon dashboard animation
    function startNeonDashboard() {
      const chart = document.getElementById('neonChart');
      if (chart) {
        let bars = '';
        for (let i = 0; i < 20; i++) {
          const h = 20 + Math.random() * 80;
          bars += `<div class="pg-darkneon-bar" style="height:${h}%"></div>`;
        }
        chart.innerHTML = bars;
      }
      let count = 0;
      function animateNeonVals() {
        const el1 = document.getElementById('neonVal1');
        const el2 = document.getElementById('neonVal2');
        const el3 = document.getElementById('neonVal3');
        if (!el1) return;
        count++;
        const p = Math.min(count / 40, 1);
        const e = 1 - Math.pow(1 - p, 3);
        el1.textContent = Math.floor(12847 * e).toLocaleString();
        el2.textContent = Math.floor(3421 * e).toLocaleString();
        el3.textContent = (99.97 * e).toFixed(2);
        if (count < 40) window._pgAnimId = requestAnimationFrame(animateNeonVals);
        else {
          // Live update simulation
          window._pgInterval = setInterval(() => {
            if (!document.getElementById('neonVal1')) return clearInterval(window._pgInterval);
            document.getElementById('neonVal1').textContent = (12847 + Math.floor(Math.random() * 200 - 100)).toLocaleString();
            document.getElementById('neonVal2').textContent = (3421 + Math.floor(Math.random() * 100 - 50)).toLocaleString();
            // Animate chart bars
            if (chart) {
              chart.querySelectorAll('.pg-darkneon-bar').forEach(bar => {
                bar.style.height = (20 + Math.random() * 80) + '%';
              });
            }
          }, 1500);
        }
      }
      animateNeonVals();
    }

    // ======================== PROMPT BUILDER ========================
    function openBuilder() {
      const bl = document.getElementById('builderOverlay');
      const bd = document.getElementById('builder');
      const builderCats = [
        { label: 'デザインスタイル', items: DATA.filter(d => d.category === 'style').map(d => d.word) },
        { label: '配色', items: DATA.filter(d => d.category === 'color').map(d => d.word) },
        { label: 'レイアウト', items: DATA.filter(d => d.category === 'layout').map(d => d.word) },
        { label: 'タイポグラフィ', items: DATA.filter(d => d.category === 'typo').map(d => d.word) },
        { label: 'アニメーション', items: DATA.filter(d => d.category === 'motion').map(d => d.word) },
        { label: '雰囲気', items: DATA.filter(d => d.category === 'mood').map(d => d.word) },
        { label: 'コンポーネント', items: DATA.filter(d => d.category === 'component').map(d => d.word) },
        { label: 'エフェクト', items: DATA.filter(d => d.category === 'effect').map(d => d.word) },
        { label: 'リファレンス', items: DATA.filter(d => d.category === 'trend').map(d => d.word) },
      ];
      let h = `<button class="modal-close" onclick="document.getElementById('builderOverlay').classList.remove('show');document.body.style.overflow=''">&times;</button>`;
      h += `<h2>🔧 プロンプトビルダー</h2>`;
      h += `<p style="font-size:.82em;color:var(--text-dim);margin-bottom:16px">デザイン要素を選んで組み合わせると、AIに渡せるプロンプトが自動生成されます。</p>`;
      h += `<div><label style="font-size:.78em;color:var(--accent);font-weight:700">何を作りますか？</label><br>
    <input type="text" id="builderTarget" placeholder="例: ポートフォリオサイト、Todoアプリ、LP..." style="width:100%;padding:10px 14px;margin:6px 0 16px;border:1px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);font-size:.88em;outline:none;font-family:inherit"></div>`;

      builderCats.forEach(cat => {
        h += `<div class="builder-cat"><h3>${cat.label}</h3><div class="builder-chips">`;
        cat.items.forEach(item => {
          h += `<button class="builder-chip" data-term="${item}">${item}</button>`;
        });
        h += `</div></div>`;
      });

      h += `<div class="builder-output"><h3>生成されたプロンプト</h3><div class="builder-prompt" id="builderResult">上のチップを選択してください...</div>
    <div class="builder-actions">
      <button class="builder-btn builder-btn-primary" id="builderCopy">📋 プロンプトをコピー</button>
      <button class="builder-btn builder-btn-secondary" id="builderClear">リセット</button>
    </div></div>`;

      bd.innerHTML = h;
      bl.classList.add('show');
      document.body.style.overflow = 'hidden';

      const selectedTerms = new Set();

      bd.querySelectorAll('.builder-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          const term = chip.dataset.term;
          if (selectedTerms.has(term)) { selectedTerms.delete(term); chip.classList.remove('on') }
          else { selectedTerms.add(term); chip.classList.add('on') }
          updateBuilderResult();
        });
      });

      function updateBuilderResult() {
        const target = document.getElementById('builderTarget').value.trim() || 'Webアプリ';
        const r = document.getElementById('builderResult');
        if (selectedTerms.size === 0) { r.textContent = '上のチップを選択してください...'; return }
        const terms = [...selectedTerms];
        const styles = terms.filter(t => DATA.find(d => d.word === t && (d.category === 'style' || d.category === 'trend')));
        const colors = terms.filter(t => DATA.find(d => d.word === t && d.category === 'color'));
        const layouts = terms.filter(t => DATA.find(d => d.word === t && d.category === 'layout'));
        const typos = terms.filter(t => DATA.find(d => d.word === t && d.category === 'typo'));
        const motions = terms.filter(t => DATA.find(d => d.word === t && (d.category === 'motion' || d.category === 'effect')));
        const moods = terms.filter(t => DATA.find(d => d.word === t && d.category === 'mood'));
        const comps = terms.filter(t => DATA.find(d => d.word === t && d.category === 'component'));

        let prompt = `以下の要件で「${target}」のUIを作成してください。\n\n`;
        if (styles.length) prompt += `【デザインスタイル】${styles.join('、')}\n`;
        if (moods.length) prompt += `【雰囲気】${moods.join('、')}\n`;
        if (colors.length) prompt += `【配色】${colors.join('、')}\n`;
        if (layouts.length) prompt += `【レイアウト】${layouts.join('、')}\n`;
        if (typos.length) prompt += `【タイポグラフィ】${typos.join('、')}\n`;
        if (motions.length) prompt += `【アニメーション・エフェクト】${motions.join('、')}\n`;
        if (comps.length) prompt += `【UIコンポーネント】${comps.join('、')}\n`;
        prompt += `\nHTML/CSS/JavaScriptで実装し、レスポンシブ対応にしてください。`;
        r.textContent = prompt;
      }

      document.getElementById('builderTarget').addEventListener('input', updateBuilderResult);

      document.getElementById('builderCopy').addEventListener('click', () => {
        const text = document.getElementById('builderResult').textContent;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('builderCopy');
          btn.textContent = '✓ コピーしました!';
          setTimeout(() => btn.textContent = '📋 プロンプトをコピー', 1500);
        });
      });

      document.getElementById('builderClear').addEventListener('click', () => {
        selectedTerms.clear();
        bd.querySelectorAll('.builder-chip').forEach(c => c.classList.remove('on'));
        document.getElementById('builderTarget').value = '';
        document.getElementById('builderResult').textContent = '上のチップを選択してください...';
      });
    }

    // ======================== EVENT LISTENERS ========================
    document.getElementById('search').addEventListener('input', e => { query = e.target.value.trim(); render() });

    document.querySelectorAll('.view-btn').forEach(b => b.addEventListener('click', () => {
      document.querySelectorAll('.view-btn').forEach(x => x.classList.remove('on'));
      b.classList.add('on'); view = b.dataset.v; render();
    }));

    document.getElementById('randBtn').addEventListener('click', () => {
      const i = Math.floor(Math.random() * DATA.length);
      openModal(i);
    });

    document.getElementById('favBtn').addEventListener('click', function () {
      favOnly = !favOnly;
      this.classList.toggle('on', favOnly);
      render();
    });

    document.getElementById('buildBtn').addEventListener('click', openBuilder);

    initTabs(); render();
  </script>
</body>

</html>
