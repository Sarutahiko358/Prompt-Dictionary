<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web UI コンポーネント辞典 - HTML/CSS/JavaScript 完全リファレンス</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%232563eb'/%3E%3Cstop offset='100%25' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' font-weight='700' font-family='system-ui' fill='white'%3EUI%3C/text%3E%3C/svg%3E">
</head>

<body>

    <!-- ===== グローバルナビ（3辞典切り替え） ===== -->
    <nav class="global-nav" id="globalNav">
        <a href="index.html" class="global-nav-tab active">
            <span>🌐</span> Web UI辞典
        </a>
        <a href="prompt-dict.html" class="global-nav-tab">
            <span>🤖</span> Coding Prompt
        </a>
        <a href="design-dict.html" class="global-nav-tab">
            <span>🎨</span> Design Prompt
        </a>
        <button class="theme-toggle" id="themeToggle" title="テーマ切り替え">☀️</button>
    </nav>

    <!-- ===== ヘッダー ===== -->
    <header class="app-header">
        <div class="header-text">
            <h1>Web UI コンポーネント辞典</h1>
            <p>HTML / CSS / JavaScript — 完全リファレンス</p>
        </div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 検索... (Ctrl+K)">
        </div>
    </header>

    <!-- ===== サイドバー（カテゴリ目次） ===== -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>📑 カテゴリ</span>
            <button class="sidebar-close" id="sidebarClose">✕</button>
        </div>
        <nav class="sidebar-nav" id="sidebarNav"></nav>
    </aside>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== サイドバー開閉ボタン（モバイル用） ===== -->
    <button class="sidebar-toggle" id="sidebarToggle" title="カテゴリ一覧">☰</button>

    <!-- ===== ラベルフィルタ & 統計バー ===== -->
    <div class="filter-stats-bar" id="filterStatsBar">
        <div class="label-filter" id="labelFilter"></div>
        <div class="stats-bar" id="statsBar"></div>
    </div>

    <!-- ===== ローディング ===== -->
    <div class="loading-indicator" id="loadingIndicator">
        <div class="loading-spinner"></div>
        <p>データを読み込んでいます...</p>
    </div>

    <!-- ===== 検索結果なし ===== -->
    <div class="no-result" id="noResult" style="display:none">
        <p>該当するコンポーネントが見つかりませんでした。</p>
        <p class="no-result-hint">キーワードを変えて検索してみてください。</p>
    </div>

    <!-- ===== メインコンテンツ ===== -->
    <div class="main-content" id="mainContent"></div>

    <!-- ===== スクロールトップ ===== -->
    <button class="scroll-top" id="scrollTop" title="トップに戻る">↑</button>

    <!-- ===== スクリプト読み込み ===== -->
    <script src="js/data-loader.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
