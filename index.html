<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web UI コンポーネント辞典 - HTML/CSS/JavaScript 完全リファレンス</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%232563eb'/%3E%3Cstop offset='100%25' stop-color='%237c3aed'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='8' fill='url(%23g)'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' font-weight='700' font-family='system-ui' fill='white'%3EUI%3C/text%3E%3C/svg%3E">
</head>

<body>

    <!-- ===== ヘッダー ===== -->
    <header class="app-header">
        <h1>Web UI コンポーネント辞典</h1>
        <p>HTML / CSS / JavaScript — 完全リファレンス</p>

        <!-- ★ここを追加：姉妹辞典へのリンク -->
        <nav class="sister-nav">
            <span class="sister-nav-label">姉妹辞典</span>

            <a href="prompt-dict.html" class="sister-link">
                <span class="sister-icon">🤖</span>
                AI Coding Prompt辞典
            </a>
            <a href="design-dict.html" class="sister-link">
                <span class="sister-icon">🎨</span>
                AI Design Prompt辞典
            </a>
        </nav>

        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="検索... (Ctrl+K)">
        </div>
    </header>

    <!-- ===== カテゴリタブ ===== -->
    <div class="category-tabs" id="categoryTabs"></div>

    <!-- ===== ラベルフィルタ & 統計バー ===== -->
    <div class="filter-stats-bar">
        <div class="label-filter" id="labelFilter"></div>
        <div class="stats-bar" id="statsBar"></div>
    </div>

    <!-- ===== ローディング ===== -->
    <div class="loading-indicator" id="loadingIndicator">
        <div class="loading-spinner"></div>
        <p>データを読み込んでいます...</p>
    </div>

    <!-- ===== 検索結果なし ===== -->
    <div class="no-result" id="noResult" style="display:none">
        <p>該当するコンポーネントが見つかりませんでした。</p>
        <p class="no-result-hint">キーワードを変えて検索してみてください。</p>
    </div>

    <!-- ===== メインコンテンツ ===== -->
    <div class="main-content" id="mainContent"></div>

    <!-- ===== スクロールトップ ===== -->
    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <!-- ===== スクリプト読み込み ===== -->
    <script src="js/data-loader.js"></script>
    <script src="js/app.js"></script>

</body>

</html>
